name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /root/todolist_Project
            git pull

            # 创建 .env 文件
            cat > .env << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            EOF

            # 停止旧容器
            docker compose down

            # 构建并启动
            docker compose build
            docker compose up -d

            # 等待数据库就绪
            sleep 10

            # 运行数据库迁移（如果需要）
            docker compose exec todolist-api alembic upgrade head || true
